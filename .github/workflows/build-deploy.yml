name: Build and Deploy Nexus

on:
  push:
    branches: [ main, master, release/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── Job 1 : Build Website ────────────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      # Artefact classique (7j) pour debug / téléchargement manuel
      - name: Upload website artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-web-dist
          path: dist/
          retention-days: 7

      # Artefact GitHub Pages (uniquement sur push vers main/master)
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ─── Job 2 : Build Android APK (Debug) ───────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website (for Capacitor sync)
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform (if missing)
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-android-apk-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ─── Job 3 : Deploy GitHub Pages ─────────────────────────────────────────
  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-web
    # Uniquement sur push vers main/master (pas sur les PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── Job 4 : Deploy Firebase (Rules, Config, etc.) ──────────────────────
  deploy-firebase:
    runs-on: ubuntu-latest
    needs: build-web
    # Uniquement sur push vers main/master
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore,database,remoteconfig,storage
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEXUS_CHAT_A205E }}
