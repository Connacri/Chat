name: CI & Build Check

on:
  push:
    branches: [ main, master, release/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── Job 1 : Build Check Website ──────────────────────────────────────────
  check-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Upload website artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-web-dist
          path: dist/
          retention-days: 1

  # ─── Job 2 : Build Check Android ──────────────────────────────────────────
  check-android:
    runs-on: ubuntu-latest
    needs: check-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website (for Capacitor sync)
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android || (npx cap add android && npx cap sync android)

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK (Check)
        run: cd android && ./gradlew assembleDebug --no-daemon
