name: Release Nexus

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag à publier (ex: v1.2.3)'
        required: true
        type: string
      prerelease:
        description: 'Marquer comme pre-release ?'
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requis pour créer des GitHub Releases et des tags

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ─── Build Website ───────────────────────────────────────────────────
      - name: Build website
        run: npm run build

      - name: Package website as ZIP
        run: zip -r nexus-web-${{ inputs.version }}.zip dist/

      # ─── Décoder la Keystore ─────────────────────────────────────────────
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      # ─── Build Android APK ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform (if missing)
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK (non-signé)
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Signer et aligner l'APK
        run: |
          # Trouver la version des build-tools disponible
          BUILD_TOOLS=$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner"
          ZIPALIGN="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign"

          echo "✅ Build-tools version: $BUILD_TOOLS"

          # Trouver l'APK non-signé (gère les noms différents selon la config gradle)
          APK_UNSIGNED=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "📦 APK trouvé: $APK_UNSIGNED"

          # Aligner l'APK (requis avant de signer)
          $ZIPALIGN -v 4 "$APK_UNSIGNED" app-release-aligned.apk

          # Signer l'APK
          $APKSIGNER sign \
            --ks keystore.jks \
            --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out "nexus-chat-${{ inputs.version }}.apk" \
            app-release-aligned.apk

          echo "✅ APK signé avec succès"

      - name: Vérifier la signature de l'APK
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)
          "$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner" verify \
            --verbose "nexus-chat-${{ inputs.version }}.apk"

      # ─── Créer la GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "🚀 Nexus Chat ${{ inputs.version }}"
          body: |
            ## 🌐 Nexus Chat ${{ inputs.version }}

            ### 📦 Téléchargements
            - **`nexus-web-${{ inputs.version }}.zip`** — Site web (déploie dans n'importe quel hébergeur statique)
            - **`nexus-chat-${{ inputs.version }}.apk`** — Application Android **signée** (active "Sources inconnues" avant d'installer)

            ### ✅ Changements
            Voir les commits depuis la dernière release.

            ---
            *Release créée manuellement via GitHub Actions*
          files: |
            nexus-web-${{ inputs.version }}.zip
            nexus-chat-${{ inputs.version }}.apk
          draft: false
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
