name: Release & Deploy Nexus

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Autoriser un seul build de déploiement à la fois pour éviter les conflits de tag/pages
concurrency:
  group: "release-deploy"
  cancel-in-progress: false

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ─── Calculer la version ─────────────────────────────────────────────
      - name: Calculate and set version
        id: version_bump
        run: |
          node -e '
            const fs = require("fs");
            const { execSync } = require("child_process");
            let latestTag = "";
            try {
              execSync("git fetch --tags");
              const tagList = execSync("git tag -l").toString().split("\n").map(t => t.trim()).filter(Boolean);
              const semverTags = tagList.filter(t => /^v?\d+\.\d+\.\d+$/.test(t));
              if (semverTags.length > 0) {
                semverTags.sort((a, b) => {
                  const partsA = a.replace(/^v/, "").split(".").map(Number);
                  const partsB = b.replace(/^v/, "").split(".").map(Number);
                  for (let i = 0; i < 3; i++) {
                    if (partsA[i] !== partsB[i]) return partsB[i] - partsA[i];
                  }
                  return 0;
                });
                latestTag = semverTags[0];
              }
            } catch (e) {}
            if (!latestTag) {
              try { latestTag = "v" + require("./package.json").version; } catch (err) { latestTag = "v1.0.0"; }
            }
            const match = latestTag.match(/v?(\d+)\.(\d+)\.(\d+)/);
            let major = 1, minor = 0, patch = 0;
            if (match) { major = parseInt(match[1], 10); minor = parseInt(match[2], 10); patch = parseInt(match[3], 10) + 1; }
            let newVersion = `${major}.${minor}.${patch}`;
            let newTag = `v${newVersion}`;
            if (fs.existsSync("package.json")) {
              const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
              pkg.version = newVersion;
              fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n", "utf8");
            }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${newVersion}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=${newTag}\n`);
          '

      # ─── Build Website & GitHub Pages ───────────────────────────────────
      - name: Build website
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Package website as ZIP
        run: zip -r nexus-web-${{ steps.version_bump.outputs.version }}.zip dist/

      # ─── Deploy to GitHub Pages ─────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ─── Build Android APK ───────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android || (npx cap add android && npx cap sync android)

      - name: Update Android version
        run: |
          node -e '
            const fs = require("fs");
            const file = "android/app/build.gradle";
            if (fs.existsSync(file)) {
              let content = fs.readFileSync(file, "utf8");
              const version = "${{ steps.version_bump.outputs.version }}";
              const parts = version.split(".");
              const major = parseInt(parts[0], 10) || 1;
              const minor = parseInt(parts[1], 10) || 0;
              const patch = parseInt(parts[2], 10) || 0;
              const versionCode = (major * 10000) + (minor * 100) + patch;
              content = content.replace(/versionCode\s+\d+/, `versionCode ${versionCode}`);
              content = content.replace(/versionName\s+"[^"]*"/, `versionName "${version}"`);
              fs.writeFileSync(file, content, "utf8");
            }
          '

      - name: Build and Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease --no-daemon
          cd ..
          BUILD_TOOLS=$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner"
          ZIPALIGN="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign"
          APK_UNSIGNED=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          $ZIPALIGN -v 4 "$APK_UNSIGNED" app-release-aligned.apk
          $APKSIGNER sign --ks keystore.jks --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" --ks-key-alias "${{ secrets.KEY_ALIAS }}" --key-pass pass:"${{ secrets.KEY_PASSWORD }}" --out "nexus-chat-${{ steps.version_bump.outputs.version }}.apk" app-release-aligned.apk

      # ─── Commit, Tag and Release ────────────────────────────────────────
      - name: Commit version bump
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version_bump.outputs.version }} [skip ci]" || echo "No changes"
          git tag ${{ steps.version_bump.outputs.tag }}
          git push origin HEAD:${{ github.ref_name }} --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_bump.outputs.tag }}
          name: "🚀 Nexus Chat ${{ steps.version_bump.outputs.tag }}"
          files: |
            nexus-web-${{ steps.version_bump.outputs.version }}.zip
            nexus-chat-${{ steps.version_bump.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
