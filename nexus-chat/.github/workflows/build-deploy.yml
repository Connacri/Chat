name: Build and Deploy Nexus

on:
  push:
    branches: [ main, release/* ]
  pull_request:
    branches: [ main ]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: nexus-chat/package-lock.json
      - run: cd nexus-chat && npm install
      - run: cd nexus-chat && npm run build
      - name: Upload Website Artifact
        uses: actions/upload-artifact@v3
        with:
          name: nexus-web-dist
          path: nexus-chat/dist

  build-android:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
      - name: Install Dependencies
        run: cd nexus-chat && npm install
      - name: Build Web
        run: cd nexus-chat && npm run build
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      - name: Build Android APK
        run: |
          cd nexus-chat
          npx cap add android
          npx cap sync android
          cd android && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: nexus-android-apk
          path: nexus-chat/android/app/build/outputs/apk/debug/app-debug.apk
